{{ define "main" }}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ .Title }} — AI Knowledge Library</title>
<link rel="stylesheet" href="{{ "assets/css/design-tokens.css" | relURL }}">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap');

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100vw; height: 100vh; overflow: hidden;
    font-family: var(--font-family-sans);
    background: var(--color-bg-primary);
    user-select: none;
    display: flex; flex-direction: column;
  }

  .deck { flex: 1; position: relative; overflow: hidden; min-height: 0; }
  .slides { position: relative; width: 100%; height: 100%; }

  .slide {
    position: absolute; inset: 0;
    background: var(--gradient-slide-bg);
    overflow-y: auto; overflow-x: hidden;
    display: none; flex-direction: column;
    padding: var(--slide-padding-y) var(--slide-padding-x);
  }
  .slide.active { display: flex; }

  .slide::before {
    content: ''; position: absolute; pointer-events: none;
    top: -10%; right: -8%;
    width: 38vw; height: 38vw;
    background: radial-gradient(circle, rgba(139,92,246,0.06) 0%, transparent 70%);
    border-radius: 50%; z-index: 0;
  }
  .slide > * { position: relative; z-index: 1; flex-shrink: 0; }

  .nav-bar {
    flex-shrink: 0; display: flex; align-items: center; justify-content: center;
    gap: 20px; height: 50px; background: var(--color-bg-primary);
    border-top: 1px solid var(--color-border-subtle);
  }
  .nav-btn {
    width: 34px; height: 34px; border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.12);
    background: rgba(255,255,255,0.04);
    color: var(--color-text-muted); font-size: 15px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .nav-btn:hover { background: var(--gradient-nav-hover); border-color: rgba(139,92,246,0.4); color: var(--color-text-secondary); }
  .nav-btn:disabled { opacity: 0.3; cursor: default; }
  .slide-counter { color: var(--color-text-dim); font-size: 13px; font-weight: 500; min-width: 50px; text-align: center; }

  .slide-label {
    font-size: var(--text-xs); font-weight: 700; letter-spacing: 2px;
    text-transform: uppercase; margin-bottom: 4px; color: var(--color-accent-apps);
  }
  h1 { font-size: var(--text-2xl); font-weight: 800; color: var(--color-text-primary); letter-spacing: -0.5px; }
  h1 span.gradient-text {
    background: linear-gradient(135deg, var(--color-accent-apps), var(--color-accent-llm));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  h2 { font-size: var(--text-xl); font-weight: 700; color: var(--color-text-primary); margin-bottom: 12px; }
  h3 { font-size: var(--text-lg); font-weight: 700; color: var(--color-text-secondary); margin-bottom: 4px; }
  h4 { font-size: var(--text-md); font-weight: 700; color: var(--color-text-secondary); margin-bottom: 2px; }
  .subtitle { font-size: var(--text-md); color: var(--color-text-muted); line-height: 1.5; max-width: 680px; }
  .body-text { font-size: var(--text-base); color: var(--color-text-body); line-height: 1.55; }
  .slide-meta { text-align: right; font-size: var(--text-sm); color: var(--color-text-dim); }

  .s1-row { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: clamp(14px, 2.5vh, 26px); }
  .s1-toc {
    display: grid; grid-template-columns: 1fr 1fr 1fr;
    gap: var(--spacing-sm); margin-top: clamp(16px, 3vh, 28px);
  }
  .s1-toc-item {
    background: var(--color-bg-card); border: 1px solid var(--color-border-secondary);
    border-radius: var(--radius-lg); padding: clamp(14px, 2vh, 18px); text-align: center;
  }
  .s1-toc-num { font-size: clamp(20px, 2.5vw, 28px); font-weight: 900; color: var(--color-accent-apps); margin-bottom: 4px; }
  .s1-toc-item h4 { font-size: clamp(11px, 1vw, 13px); color: var(--color-text-secondary); margin-bottom: 3px; }
  .s1-toc-item p { font-size: var(--text-xs); color: var(--color-text-dim); line-height: 1.25; }

  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: var(--spacing-sm); }
  .stat-card {
    background: var(--color-bg-card); border: 1px solid var(--color-border-secondary);
    border-radius: var(--radius-md); padding: var(--spacing-md);
  }
  .stat-value {
    font-size: clamp(16px, 1.8vw, 22px); font-weight: 800; margin-bottom: 2px;
    font-family: var(--font-family-mono);
  }
  .stat-value.accent { color: var(--color-accent-llm); }
  .stat-value.amber { color: var(--color-warning); }
  .stat-label { font-size: var(--text-xs); color: var(--color-text-muted); line-height: 1.35; }

  .dd-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: clamp(10px, 1.8vh, 18px); flex-shrink: 0; }
  .dd-content { display: flex; gap: var(--spacing-lg); flex: 1; min-height: 0; }
  .dd-left { flex: 1; min-width: 0; }
  .dd-right { flex: 1; min-width: 0; display: flex; flex-direction: column; }

  .code-block {
    background: rgba(0,0,0,0.35); border: 1px solid var(--color-border-primary);
    border-radius: var(--radius-md); padding: var(--spacing-md);
    font-family: var(--font-family-mono);
    font-size: clamp(10px, 0.95vw, 12px); color: var(--color-text-body);
    line-height: 1.6; white-space: pre-wrap; word-break: break-all;
    margin-bottom: var(--spacing-sm);
  }
  .code-comment { color: var(--color-text-dim); }
  .code-highlight { color: var(--color-accent-llm); font-weight: 600; }
  .code-tag { color: var(--color-accent-apps); font-weight: 600; }

  .flow-row {
    display: flex; align-items: center; gap: clamp(4px, 0.8vw, 8px);
    justify-content: center; margin: clamp(8px, 1.5vh, 14px) 0; flex-wrap: wrap;
  }
  .flow-step {
    background: rgba(255,255,255,0.04); border: 1px solid var(--color-border-primary);
    border-radius: var(--radius-md); padding: var(--spacing-sm) clamp(10px, 1.5vw, 16px); text-align: center;
  }
  .flow-step .step-name { font-size: clamp(10px, 0.9vw, 12px); font-weight: 700; color: var(--color-text-secondary); margin-bottom: 2px; }
  .flow-step .step-desc { font-size: clamp(8px, 0.7vw, 10px); color: var(--color-text-muted); }
  .flow-arrow { color: var(--color-accent-apps); font-size: clamp(14px, 1.5vw, 18px); font-weight: 700; flex-shrink: 0; }

  .key-points { list-style: none; flex: 1; overflow-y: auto; }
  .key-points li {
    padding: var(--spacing-xs) 0; padding-left: 18px;
    position: relative; font-size: clamp(10px, 0.95vw, 12px); color: var(--color-text-body);
    line-height: 1.5; border-bottom: 1px solid var(--color-border-subtle);
  }
  .key-points li::before {
    content: ''; position: absolute; left: 0; top: clamp(7px, 0.9vh, 9px);
    width: 6px; height: 6px; border-radius: 50%; background: var(--color-accent-llm);
  }

  .param-table {
    width: 100%; border-collapse: collapse;
    font-size: clamp(10px, 0.9vw, 12px);
    margin: var(--spacing-sm) 0;
  }
  .param-table th {
    text-align: left; padding: 6px 10px;
    color: var(--color-text-muted); font-weight: 600; font-size: 10px;
    text-transform: uppercase; letter-spacing: 1px;
    border-bottom: 1px solid var(--color-border-primary);
  }
  .param-table td {
    padding: 5px 10px; color: var(--color-text-body);
    border-bottom: 1px solid var(--color-border-subtle);
  }
  .param-table td:first-child { font-family: var(--font-family-mono); color: var(--color-text-secondary); }

  .implication-box {
    margin-top: auto; padding: clamp(7px, 1vh, 10px) 12px;
    border-radius: var(--radius-md); flex-shrink: 0;
    background: var(--color-accent-apps-bg); border: 1px solid rgba(139,92,246,0.2);
  }
  .implication-box h4 { color: var(--color-accent-llm); font-size: clamp(10px, 0.9vw, 11px); margin-bottom: 2px; }
  .implication-box p { font-size: clamp(9px, 0.85vw, 10px); color: var(--color-accent-llm); line-height: 1.45; }

  .slide-footer {
    display: flex; justify-content: space-between; align-items: center;
    margin-top: auto; padding-top: var(--spacing-sm); flex-shrink: 0;
    font-size: var(--text-xs); color: var(--color-text-dim);
  }
  .slide-footer .tag { background: var(--color-bg-card); color: var(--color-text-dim); padding: 2px 8px; border-radius: 4px; }

  .compare-row { display: grid; grid-template-columns: 1fr 1fr; gap: var(--spacing-sm); margin: var(--spacing-sm) 0; }
  .compare-card {
    background: var(--color-bg-card); border: 1px solid var(--color-border-secondary);
    border-radius: var(--radius-md); padding: var(--spacing-md);
  }
  .compare-card h4 { font-size: clamp(11px, 1vw, 13px); margin-bottom: 6px; }
  .compare-card ul { list-style: none; }
  .compare-card ul li {
    font-size: clamp(10px, 0.85vw, 11px); color: var(--color-text-muted); line-height: 1.5;
    padding: 2px 0; padding-left: 12px; position: relative;
  }
  .compare-card ul li::before { content: '•'; position: absolute; left: 0; color: var(--color-accent-apps); }

  .do-dont { display: grid; grid-template-columns: 1fr 1fr; gap: var(--spacing-sm); margin: var(--spacing-sm) 0; }
  .do-card {
    background: var(--color-success-bg); border: 1px solid rgba(52,211,153,0.15);
    border-radius: var(--radius-md); padding: var(--spacing-md);
  }
  .do-card h4 { color: var(--color-success); }
  .do-card ul li { font-size: clamp(10px, 0.85vw, 11px); color: var(--color-success); line-height: 1.5; padding: 2px 0; padding-left: 12px; position: relative; list-style: none; }
  .do-card ul li::before { content: '✓'; position: absolute; left: 0; color: var(--color-success); font-weight: 600; }
  .dont-card {
    background: var(--color-error-bg); border: 1px solid rgba(248,113,113,0.15);
    border-radius: var(--radius-md); padding: var(--spacing-md);
  }
  .dont-card h4 { color: var(--color-error); }
  .dont-card ul li { font-size: clamp(10px, 0.85vw, 11px); color: var(--color-error); line-height: 1.5; padding: 2px 0; padding-left: 12px; position: relative; list-style: none; }
  .dont-card ul li::before { content: '✗'; position: absolute; left: 0; color: var(--color-error); font-weight: 600; }

  .prompt-annotated {
    background: rgba(0,0,0,0.25); border: 1px solid var(--color-border-primary);
    border-radius: var(--radius-lg); padding: clamp(12px, 2vh, 18px);
    font-family: var(--font-family-mono);
    font-size: clamp(10px, 0.9vw, 12px); color: var(--color-text-body);
    line-height: 1.7; margin: var(--spacing-sm) 0; position: relative;
  }
  .prompt-annotated .pa-line { display: block; padding-left: 6px; }
  .pa-label {
    position: absolute; right: 8px;
    font-size: clamp(7px, 0.6vw, 8px); font-weight: 600;
    background: rgba(139,92,246,0.3); color: var(--color-accent-llm);
    padding: 1px 6px; border-radius: 3px;
    text-transform: uppercase; letter-spacing: 1px; white-space: nowrap;
  }

  .icon-grid { display: grid; grid-template-columns: 1fr 1fr; gap: var(--spacing-sm); }
  .icon-card {
    background: var(--color-bg-card); border: 1px solid var(--color-border-subtle);
    border-radius: var(--radius-md); padding: var(--spacing-md);
    display: flex; gap: 10px; align-items: flex-start;
  }
  .icon-card .ic-icon { font-size: clamp(18px, 2vw, 24px); flex-shrink: 0; margin-top: 2px; }
  .icon-card h4 { font-size: clamp(11px, 1vw, 13px); margin-bottom: 2px; }
  .icon-card p { font-size: var(--text-xs); color: var(--color-text-muted); line-height: 1.4; }

  .tier-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: var(--spacing-sm); margin: var(--spacing-sm) 0; }
  .tier-card {
    background: var(--color-bg-card); border: 1px solid var(--color-border-subtle);
    border-radius: var(--radius-md); padding: var(--spacing-md);
  }
  .tier-badge {
    display: inline-block; padding: 2px 8px; border-radius: 4px;
    font-size: clamp(8px, 0.7vw, 9px); font-weight: 700; letter-spacing: 1px;
    text-transform: uppercase; margin-bottom: 6px;
  }
  .tier-foundation { background: var(--color-success-bg); color: var(--color-success); }
  .tier-intermediate { background: var(--color-accent-models-bg); color: var(--color-accent-models); }
  .tier-advanced { background: rgba(251,191,36,0.15); color: var(--color-warning); }

  .diagram-box {
    background: rgba(255,255,255,0.02); border: 1px solid var(--color-border-secondary);
    border-radius: var(--radius-lg); padding: clamp(12px, 2vh, 18px);
    margin: var(--spacing-sm) 0;
  }
  .diagram-box h4 { color: var(--color-accent-llm); margin-bottom: 8px; }

  .prompt-annotated {
    background: rgba(0,0,0,0.25); border: 1px solid var(--color-border-primary);
    border-radius: var(--radius-lg); padding: clamp(12px, 2vh, 18px);
    font-family: var(--font-family-mono);
    font-size: clamp(10px, 0.9vw, 12px); color: var(--color-text-body);
    line-height: 1.7; margin: var(--spacing-sm) 0; position: relative;
  }
  .prompt-annotated .pa-line { display: block; padding-left: 6px; }
  .pa-label {
    position: absolute; right: 8px;
    font-size: clamp(7px, 0.6vw, 8px); font-weight: 600;
    background: rgba(139,92,246,0.3); color: var(--color-accent-llm);
    padding: 1px 6px; border-radius: 3px;
    text-transform: uppercase; letter-spacing: 1px;
  }
</style>
</head>
<body>

<div class="deck"><div class="slides">

{{ range $index, $slide := .Params.slides }}
<div class="slide{{ if eq $index 0 }} active{{ end }}" data-index="{{ add $index 1 }}">
  {{ $slide.content | safeHTML }}
  <div class="slide-footer">
    <span>AI Knowledge Library · github.com/kantan-sys/ai-knowledge-lib</span>
    <span class="tag">{{ add $index 1 }} / {{ len $.Params.slides }}</span>
  </div>
</div>
{{ end }}

</div></div>

<div class="nav-bar">
  <button class="nav-btn" id="prevBtn" onclick="navigate(-1)" disabled>←</button>
  <span class="slide-counter" id="counter">1 / {{ len .Params.slides }}</span>
  <button class="nav-btn" id="nextBtn" onclick="navigate(1)">→</button>
</div>

<script>
  let currentSlide = 1;
  const totalSlides = {{ len .Params.slides }};

  function navigate(dir) {
    const next = currentSlide + dir;
    if (next < 1 || next > totalSlides) return;
    document.querySelector(`.slide[data-index="${currentSlide}"]`).classList.remove('active');
    document.querySelector(`.slide[data-index="${next}"]`).classList.add('active');
    currentSlide = next;
    updateNav();
  }

  function updateNav() {
    document.getElementById('counter').textContent = `${currentSlide} / ${totalSlides}`;
    document.getElementById('prevBtn').disabled = currentSlide === 1;
    document.getElementById('nextBtn').disabled = currentSlide === totalSlides;
  }

  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === ' ') {
      e.preventDefault(); navigate(1);
    } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
      e.preventDefault(); navigate(-1);
    } else if (e.key === 'Home') {
      e.preventDefault();
      document.querySelector(`.slide[data-index="${currentSlide}"]`).classList.remove('active');
      currentSlide = 1;
      document.querySelector('.slide[data-index="1"]').classList.add('active');
      updateNav();
    } else if (e.key === 'End') {
      e.preventDefault();
      document.querySelector(`.slide[data-index="${currentSlide}"]`).classList.remove('active');
      currentSlide = totalSlides;
      document.querySelector(`.slide[data-index="${totalSlides}"]`).classList.add('active');
      updateNav();
    }
  });
</script>

</body>
</html>
{{ end }}
