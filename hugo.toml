baseURL = 'https://kantan-sys.github.io/ai-knowledge-lib/'
locale = 'en-us'
title = 'AI Knowledge Library'
theme = 'hugo-book'

[params]
  # Hugo Book theme params
  BookSection = 'artefacts'
  BookSearch = true
  BookRepo = 'https://github.com/kantan-sys/ai-knowledge-lib'
  BookEditPath = 'edit/master'

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[menu]
  [[menu.after]]
    name = "GitHub"
    url = "https://github.com/kantan-sys/ai-knowledge-lib"
    weight = 10